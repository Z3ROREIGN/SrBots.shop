# ============================================================
# Configuração do Cloudflare Worker - SrBots.shop
# ============================================================
# Este arquivo configura o deployment do worker na Cloudflare
# Versão: 1.4.0

# ── Informações do Projeto ─────────────────────────────────
name = "srbots"
main = "src/worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ── Banco de Dados D1 ──────────────────────────────────────
# Configure o database_id após criar o banco no painel Cloudflare
[[d1_databases]]
binding = "DB"
database_name = "srbots-db"
database_id = ""  # Preencha com o ID gerado no painel da Cloudflare

# ── Arquivos Estáticos (Frontend) ──────────────────────────
[assets]
directory = "./public"
binding = "ASSETS"

# ── Variáveis de Ambiente ──────────────────────────────────
# Variáveis públicas (não sensíveis)
[env.production]
vars = { ENVIRONMENT = "production" }

[env.staging]
vars = { ENVIRONMENT = "staging" }

# ── Secrets (Variáveis Sensíveis) ──────────────────────────
# IMPORTANTE: Configure estas variáveis no painel Cloudflare
# em Settings > Variables > Secrets, NÃO neste arquivo
#
# Secrets obrigatórios:
# - JWT_SECRET: String longa e aleatória para assinatura de tokens
# - MISTICPAY_CLIENT_ID: Client ID da MisticPay
# - MISTICPAY_CLIENT_SECRET: Client Secret da MisticPay
# - ADMIN_EMAIL: Email do primeiro usuário admin
# - ADMIN_PASSWORD: Senha do primeiro usuário admin
#
# Secrets opcionais:
# - ALLOWED_ORIGIN: CORS origin (padrão: *)
# - WEBHOOK_SECRET: Secret para validação de webhooks
