# Configuração do Cloudflare Worker SrBots.shop
name = "srbots"
main = "src/worker.js"
compatibility_date = "2023-12-01"

# ─── Banco de Dados D1 ──────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "srbots-db"
database_id = "" # Preencha com o ID gerado no painel da Cloudflare

# ─── Arquivos Estáticos (Frontend) ─────────────────────────────
[assets]
directory = "./public"

# ─── Variáveis de Ambiente e Secrets ────────────────────────────
# As chaves JWT_SECRET, MISTICPAY_CLIENT_ID, MISTICPAY_CLIENT_SECRET, 
# ADMIN_EMAIL e ADMIN_PASSWORD devem ser configuradas no painel 
# da Cloudflare em Settings > Variables > Secrets.
