<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta — SrBots</title>
  <link rel="icon" href="/assets/img/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body style="background:var(--bg-primary);display:flex;flex-direction:column;min-height:100vh;align-items:center;justify-content:center;padding:1rem">

<div style="width:100%;max-width:420px">
  <div style="text-align:center;margin-bottom:2rem">
    <a href="/" style="display:inline-flex;align-items:center;gap:0.75rem;font-size:1.5rem;font-weight:800">
      <img src="/assets/img/logo.svg" alt="SrBots" style="width:44px;height:44px;border-radius:var(--radius-md);box-shadow:var(--shadow-glow)">
      <span class="gradient-text">SrBots</span>
    </a>
    <p class="text-secondary mt-2">Crie sua conta grátis</p>
  </div>

  <div class="card" style="padding:2rem">
    <div id="error-msg" class="alert alert-error mb-3" style="display:none"></div>

    <form id="register-form" onsubmit="handleRegister(event)">
      <div style="display:flex;flex-direction:column;gap:1.25rem">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" id="username" class="form-input" placeholder="seunome" required minlength="3" maxlength="30" pattern="[a-zA-Z0-9_]+" autocomplete="username">
          <span class="form-error" id="username-error" style="display:none"></span>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-input" placeholder="seu@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <div style="position:relative">
            <input type="password" id="password" class="form-input" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password">
            <button type="button" onclick="togglePassword('password')" style="position:absolute;right:1rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.1rem">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirmar Senha</label>
          <input type="password" id="confirm-password" class="form-input" placeholder="Repita a senha" required autocomplete="new-password">
        </div>

        <!-- Termos -->
        <label style="display:flex;align-items:flex-start;gap:0.75rem;cursor:pointer;font-size:0.875rem">
          <input type="checkbox" id="terms" required style="margin-top:0.2rem;accent-color:var(--purple)">
          <span class="text-secondary">Concordo com os <a href="#" style="color:var(--purple-light)">Termos de Uso</a> e <a href="#" style="color:var(--purple-light)">Política de Privacidade</a></span>
        </label>

        <button type="submit" class="btn btn-primary w-full btn-lg" id="register-btn">
          Criar Conta
        </button>
      </div>
    </form>

    <div style="text-align:center;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border)">
      <p class="text-secondary font-sm">Já tem conta? <a href="/login" style="color:var(--purple-light);font-weight:600">Entrar</a></p>
    </div>
  </div>

  <div style="text-align:center;margin-top:1.5rem">
    <a href="/" class="text-muted font-sm">← Voltar ao início</a>
  </div>
</div>

<script src="/assets/js/app.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = '/dashboard';

  function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  async function handleRegister(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm-password').value;
    const btn = document.getElementById('register-btn');
    const errEl = document.getElementById('error-msg');

    errEl.style.display = 'none';

    if (password !== confirm) {
      errEl.textContent = 'As senhas não coincidem';
      errEl.style.display = 'flex';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px"></div> Criando conta...';

    const res = await API.post('/auth/register', { username, email, password }, false);

    btn.disabled = false;
    btn.innerHTML = 'Criar Conta';

    if (res.error) {
      errEl.textContent = res.error;
      errEl.style.display = 'flex';
      return;
    }

    Auth.setAuth(res.data.token, res.data.user);
    Toast.success('Conta criada com sucesso! Bem-vindo ao SrBots! 🎉');
    setTimeout(() => window.location.href = '/dashboard', 1000);
  }
</script>
</body>
</html>
