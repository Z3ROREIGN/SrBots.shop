<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9d5af0;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="40" height="40" rx="10" fill="url(#grad)"/>
  <!-- Robot head -->
  <rect x="10" y="11" width="20" height="16" rx="4" fill="#0a0a0f" opacity="0.85"/>
  <!-- Screen/face -->
  <rect x="12" y="13" width="16" height="10" rx="2.5" fill="url(#screenGrad)" opacity="0.25"/>
  <!-- Left eye -->
  <circle cx="16.5" cy="18" r="2.5" fill="#22d3ee"/>
  <circle cx="16.5" cy="18" r="1" fill="#fff"/>
  <!-- Right eye -->
  <circle cx="23.5" cy="18" r="2.5" fill="#22d3ee"/>
  <circle cx="23.5" cy="18" r="1" fill="#fff"/>
  <!-- Antenna -->
  <line x1="20" y1="11" x2="20" y2="7" stroke="#9d5af0" stroke-width="2" stroke-linecap="round"/>
  <circle cx="20" cy="6" r="2" fill="#9d5af0"/>
  <!-- Mouth - friendly smile -->
  <path d="M15 23 Q17.5 25.5 20 23.5 Q22.5 25.5 25 23" stroke="#22d3ee" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Side ears/antennas -->
  <rect x="7" y="16" width="3" height="5" rx="1.5" fill="#7c3aed"/>
  <rect x="30" y="16" width="3" height="5" rx="1.5" fill="#06b6d4"/>
  <!-- Bottom body hint -->
  <rect x="14" y="28" width="12" height="4" rx="2" fill="#0a0a0f" opacity="0.6"/>
  <rect x="16" y="29" width="3" height="2" rx="0.5" fill="#7c3aed" opacity="0.6"/>
  <rect x="21" y="29" width="3" height="2" rx="0.5" fill="#06b6d4" opacity="0.6"/>
</svg>
